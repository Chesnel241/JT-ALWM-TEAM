version: '3.8'

services:
  # =========================================================================
  # Caddy Reverse Proxy (Gère les domaines, SSL, et route le trafic)
  # =========================================================================
  caddy:
    image: caddy:2-alpine
    container_name: jt-alwm-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
      - uploads_volume:/app/uploads
    networks:
      - jt-alwm-network
    depends_on:
      - frontend
      - backend

  # =========================================================================
  # Backend Service - Node.js Express API
  # =========================================================================
  backend:
    container_name: jt-alwm-backend
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - NODE_ENV=production
      - PORT=3010
      - CORS_ORIGIN=*
      - RENDERER=remotion
      - RENDER_WORKER_URL=http://worker:8080
      - WORKER_KEY=internal_secret_key
      - PUBLIC_API_URL=http://backend:3010
      - GLOBAL_PASSWORD=${GLOBAL_PASSWORD}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - UPSTASH_REDIS_REST_URL=${UPSTASH_REDIS_REST_URL}
      - UPSTASH_REDIS_REST_TOKEN=${UPSTASH_REDIS_REST_TOKEN}
    volumes:
      - uploads_volume:/app/uploads
    networks:
      - jt-alwm-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3010/health', (r) => {if (r.statusCode !== 200) throw new Error(r.statusCode)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # =========================================================================
  # Frontend Service - React + Vite served by Nginx
  # =========================================================================
  frontend:
    container_name: jt-alwm-frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
    networks:
      - jt-alwm-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # =========================================================================
  # Worker Service - Moteur de rendu Remotion/Puppeteer
  # =========================================================================
  worker:
    container_name: jt-alwm-worker
    build:
      context: .
      dockerfile: worker/Dockerfile
    environment:
      - PORT=8080
      - WORKER_KEY=internal_secret_key
    networks:
      - jt-alwm-network
    volumes:
      - uploads_volume:/app/uploads
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:8080/health', (r) => {if (r.statusCode !== 200) throw new Error(r.statusCode)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

# ============================================================================
# Volumes for persistent data
# ============================================================================
volumes:
  uploads_volume:
    driver: local
  caddy_data:
  caddy_config:

# ============================================================================
# Networks for service communication
# ============================================================================
networks:
  jt-alwm-network:
    driver: bridge
