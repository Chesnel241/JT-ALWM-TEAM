# ⚠️  CE FICHIER EST POUR LE DÉVELOPPEMENT LOCAL UNIQUEMENT.
# NODE_ENV=development + VITE_API_URL=localhost → NE PAS utiliser sur un VPS
# (les navigateurs des pays appelleraient leur PROPRE localhost).
# Pour la production VPS : `docker compose -f docker-compose.prod.yml up -d --build`
# (cf. docs/VPS.md).
services:
  # =========================================================================
  # Backend Service - Node.js Express API
  # =========================================================================
  backend:
    container_name: jt-alwm-backend
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3010:3010"
    environment:
      - NODE_ENV=development
      - PORT=3010
      - CORS_ORIGIN=http://localhost:5173,http://localhost
    volumes:
      # Mount uploads directory to persist data between restarts
      - uploads_volume:/app/uploads
      # Mount source code for development (optional, comment for prod)
      - ./backend/src:/app/src
    networks:
      - jt-alwm-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3010/health', (r) => {if (r.statusCode !== 200) throw new Error(r.statusCode)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # =========================================================================
  # Frontend Service - React + Vite served by Nginx
  # =========================================================================
  frontend:
    container_name: jt-alwm-frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://localhost:3010
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - jt-alwm-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

# ============================================================================
# Volumes for persistent data
# ============================================================================
volumes:
  uploads_volume:
    driver: local

# ============================================================================
# Networks for service communication
# ============================================================================
networks:
  jt-alwm-network:
    driver: bridge
