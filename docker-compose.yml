version: '3.8'

services:
  # =========================================================================
  # Backend Service - Node.js Express API
  # =========================================================================
  backend:
    container_name: jt-alwm-backend
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3010:3010"
    environment:
      - NODE_ENV=development
      - PORT=3010
      - CORS_ORIGIN=http://localhost:5173,http://localhost
    volumes:
      # Mount uploads directory to persist data between restarts
      - uploads_volume:/app/uploads
      # Mount source code for development (optional, comment for prod)
      - ./backend/src:/app/src
    networks:
      - jt-alwm-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3010', (r) => {if (r.statusCode !== 404) throw new Error(r.statusCode)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # =========================================================================
  # Frontend Service - React + Vite served by Nginx
  # =========================================================================
  frontend:
    container_name: jt-alwm-frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
    environment:
      - VITE_API_URL=http://backend:3010
    networks:
      - jt-alwm-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

# ============================================================================
# Volumes for persistent data
# ============================================================================
volumes:
  uploads_volume:
    driver: local

# ============================================================================
# Networks for service communication
# ============================================================================
networks:
  jt-alwm-network:
    driver: bridge
