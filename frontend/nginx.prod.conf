server {
  listen 80;
  server_name _;

  # Uploads volumineux (fallback local / multipart) : R2 presigné passe en
  # direct navigateur→R2, mais on autorise large par sécurité.
  client_max_body_size 250m;

  # Gzip
  gzip on;
  gzip_types text/plain text/css text/xml text/javascript
             application/x-javascript application/xml+rss
             application/javascript application/json image/svg+xml;
  gzip_min_length 1024;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 6;

  # ==========================================================================
  # API → backend Express. `^~` pour battre la regex d'assets statiques plus
  # bas (sinon /api/x.js serait servi en statique → 404).
  # ==========================================================================
  location ^~ /api/ {
    proxy_pass http://backend:3010;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # SSE (/api/editor/progress) : pas de buffering, connexion longue.
    proxy_buffering off;
    proxy_cache off;
    proxy_set_header Connection '';
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
  }

  # Lecture des médias (redirige 302 vers R2 présigné, ou stream local).
  location ^~ /uploads/ {
    proxy_pass http://backend:3010;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 600s;
  }

  # Cache agressif des assets hashés (immutables). HTML exclu (voir SPA).
  location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
    root /usr/share/nginx/html;
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # index.html : jamais mis en cache (SPA reçoit toujours la dernière version
  # après un nouveau build — cohérent avec le SW NetworkFirst).
  location = /index.html {
    root /usr/share/nginx/html;
    add_header Cache-Control "no-cache, must-revalidate";
  }

  # SPA routing.
  location / {
    root /usr/share/nginx/html;
    try_files $uri $uri/ /index.html;
  }

  # Health check du conteneur frontend (local, ne touche pas le backend).
  location = /nginx-health {
    return 200 "OK\n";
    add_header Content-Type text/plain;
  }
}
