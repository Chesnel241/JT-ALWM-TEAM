version: 2024-07

services:
  - type: web
    name: jt-alwm-backend
    env: node
    rootDir: backend
    plan: starter
    region: frankfurt

    buildCommand: npm ci
    startCommand: npm start

    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3010
      - key: CORS_ORIGIN
        sync: false
      - key: SENTRY_DSN
        sync: false
      - key: MAX_FILE_SIZE
        value: 209715200          # 200 Mo : rushes (par pays, par jour)
      - key: DELIVERY_MAX_FILE_SIZE
        value: 419430400          # 400 Mo : JT Prêt (montage final hebdo)
      # IMPORTANT — toutes les données persistantes vivent sous
      # /app/uploads (le disque monté ci-dessous). Sans ces 3 env vars,
      # le code écrit dans des chemins éphémères qui sont wipés à chaque
      # redéploiement (pays custom, métadonnées et fichiers disparaissent).
      - key: LOG_DIR
        value: /app/uploads/logs
      - key: JT_STORE_PATH
        value: /app/uploads/store.json
      - key: UPLOADS_DIR
        value: /app/uploads/files

      - key: UPSTASH_REDIS_REST_URL
        sync: false
      - key: UPSTASH_REDIS_REST_TOKEN
        sync: false
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET_NAME
        sync: false

    healthCheckPath: /health

    # IMPORTANT: scaling forcé à 1 instance. Le store JSON et les uploads
    # multer vivent sur un disque local non partagé entre instances —
    # passer à 2+ entraînerait divergence des données et fichiers
    # introuvables. Migration Postgres + S3/R2 requise avant scale-out.
    scaling:
      minInstances: 1
      maxInstances: 1
      targetMemoryPercent: 75
      targetCPUPercent: 75
